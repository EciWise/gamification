# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - gamification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6A3BCFBE67784D2D995886F9127386CA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DC80AA9A3DD7456B894A77CAFB28EABF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F655F7782CD0481B9C0B950F6B9C8714 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'gamification'
          slot-name: 'Production'
          package: .

      - name: Configure Azure App Service Environment Variables
        run: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "gamification" \
            --settings \
              POSTGRES_CONNECTION="${{ secrets.POSTGRES_CONNECTION }}" \
              JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              JWT_ISSUER="${{ secrets.JWT_ISSUER }}" \
              JWT_AUDIENCE="${{ secrets.JWT_AUDIENCE }}" \
              REDIS_CONNECTION_STRING="${{ secrets.REDIS_CONNECTION_STRING }}" \
              RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}" \
              RABBITMQ_USER="${{ secrets.RABBITMQ_USER }}" \
              RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
              RABBITMQ_VHOST="${{ secrets.RABBITMQ_VHOST }}" \
              RABBITMQ_CONNECTION="${{ secrets.RABBITMQ_CONNECTION }}" \
              CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"