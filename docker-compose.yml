version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gamification-postgres
    environment:
      POSTGRES_USER: gamification_user
      POSTGRES_PASSWORD: Segura123!
      POSTGRES_DB: gamification_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gamification-net

  redis:
    image: redis:7-alpine
    container_name: gamification-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gamification-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gamification-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gamification-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/eciwise/gamification:latest
    container_name: gamification-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=gamification_db;Username=gamification_user;Password=Segura123!"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - gamification-net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  gamification-net:
    driver: bridge