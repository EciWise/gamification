services:
  postgres:
    image: postgres:15-alpine
    container_name: gamification-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gamification_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamification_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gamification_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gamification-net

  redis:
    image: redis:7-alpine
    container_name: gamification-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gamification-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gamification-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gamification-net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  gamification-net:
    driver: bridge
